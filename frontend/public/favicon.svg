<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512" fill="none">

  <!-- Background -->
  <rect width="512" height="512" rx="112" fill="url(#bgGrad)"/>

  <!-- Warm glow behind sunrise -->
  <circle cx="256" cy="340" r="210" fill="url(#centerGlow)" opacity="0.38"/>

  <!-- Horizon base line -->
  <rect x="80" y="340" width="296" height="10" rx="5" fill="white" opacity="0.28"/>

  <!-- Sunrise semicircle — large, centered -->
  <path d="M80 344 A148 148 0 0 1 376 344 Z" fill="url(#semicircleGrad)"/>
  <!-- Inner arc highlight -->
  <path d="M116 344 A112 112 0 0 1 340 344 Z" fill="url(#innerArc)" opacity="0.45"/>

  <!-- SPARK — small, sits upper-right, close to the sunrise -->
  <!-- Spark glow halo -->
  <circle cx="358" cy="198" r="30" fill="white" opacity="0.10"/>

  <!-- 4-pointed starburst -->
  <path d="M358 154 C360 176 369 187 358 198 C347 187 356 176 358 154Z" fill="white" opacity="0.95"/>
  <path d="M358 242 C356 220 347 209 358 198 C369 209 360 220 358 242Z" fill="white" opacity="0.85"/>
  <path d="M314 198 C336 196 349 189 358 198 C349 207 336 200 314 198Z" fill="white" opacity="0.85"/>
  <path d="M402 198 C380 200 367 207 358 198 C367 189 380 196 402 198Z" fill="white" opacity="0.75"/>

  <!-- Bright core -->
  <circle cx="358" cy="198" r="7" fill="white" opacity="1"/>

  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#FF922B"/>
      <stop offset="50%" stop-color="#F03868"/>
      <stop offset="100%" stop-color="#AE1C55"/>
    </linearGradient>

    <radialGradient id="centerGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FFE8A0" stop-opacity="1"/>
      <stop offset="100%" stop-color="#FF922B" stop-opacity="0"/>
    </radialGradient>

    <linearGradient id="semicircleGrad" x1="256" y1="196" x2="256" y2="344" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#FFE566" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#FF8C2A" stop-opacity="0.75"/>
    </linearGradient>

    <linearGradient id="innerArc" x1="256" y1="232" x2="256" y2="344" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#FFE566" stop-opacity="0"/>
    </linearGradient>
  </defs>
</svg>
